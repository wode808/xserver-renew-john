name: XServer-Vmail-VPS

on:
  workflow_dispatch:
  schedule:
    - cron: '46 0 * * *'  # UTC 00:46 = 北京时间 08:46

jobs:
  run_xserver_renew:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/XServer-VPS-Renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/renew.py renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ✅ 核心修复：用 outputs 控制后续步骤
      - name: ⏱️ 控制执行频率（严格48小时）
        id: check_time
        run: |
          echo "计算是否需要执行..."

          START_TIME=$(date -u -d "2026-03-20 00:46" +%s)
          NOW=$(date +%s)

          DIFF=$((NOW - START_TIME))

          echo "当前时间戳: $NOW"
          echo "起始时间戳: $START_TIME"
          echo "差值: $DIFF 秒"

          # 还没到起始时间
          if [ $DIFF -lt 0 ]; then
            echo "⏭️ 未到起始时间"
            echo "run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PERIOD=172800      # 48小时
          TOLERANCE=600      # 10分钟容差

          REMAINDER=$((DIFF % PERIOD))

          echo "周期余数: $REMAINDER"

          if (( REMAINDER > TOLERANCE && REMAINDER < PERIOD - TOLERANCE )); then
            echo "⏭️ 未到执行窗口，跳过"
            echo "run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✅ 满足48小时执行条件"
          echo "run=true" >> $GITHUB_OUTPUT

      # =========================
      # 下面所有步骤都加 if 控制
      # =========================

      - name: 🛡️ 启动 Gost 代理转发
        if: steps.check_time.outputs.run == 'true'
        run: |
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          echo "启动 Gost 转发隧道..."
          nohup ./gost -L http://:8080 -F ${{ secrets.GOST_PROXY }} > gost.log 2>&1 &
          sleep 3
          echo "测试代理..."
          curl -x http://127.0.0.1:8080 https://api.ipify.org

      - name: 🛠️ 安装系统依赖
        if: steps.check_time.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        if: steps.check_time.outputs.run == 'true'
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行脚本
        if: steps.check_time.outputs.run == 'true'
        env:
          PYTHONIOENCODING: utf-8
          XSERVER_ACCOUNT: ${{ secrets.XSERVER_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传截图
        if: always() && steps.check_time.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
